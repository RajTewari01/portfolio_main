name: Node.js CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm run build
      env:
        # Dummy build-time variables for Next.js to bypass missing keys on generic runners
        NEXT_PUBLIC_SUPABASE_URL: https://mock.supabase.co
        NEXT_PUBLIC_SUPABASE_ANON_KEY: mock_key
        NEXT_PUBLIC_FIREBASE_API_KEY: mock_key
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: mock_domain
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: mock_project
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: mock_bucket
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: mock_sender
        NEXT_PUBLIC_FIREBASE_APP_ID: mock_app
